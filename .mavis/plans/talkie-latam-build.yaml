  - id: p6-deploy
    title: 'Vercel deployment + custom domain + CI/CD + env vars'
    prompt: |
      You are the Deployment Agent for Talkie LATAM.

      PROJECT: /Users/felirami/.mavis/agents/general/workspace/talkie-latam/

      CONTEXT:
      - Next.js 14 app with TypeScript
      - Uses: Drizzle ORM, PostgreSQL (Railway), Redis (Upstash), Replicate API
      - Already has vercel-build script in package.json
      - .env.example and .vercelignore exist from Phase 1

      YOUR DELIVERABLE — production deployment setup:

      TASKS:

      A) VERCEL PROJECT CONFIG:
         Create .vercelignore if not already complete (should include):
         .env*
         .env.local
         node_modules/
         .next/
         *.test.ts
         *.spec.ts
         drizzle.config.ts
         scripts/
         public/icons/  (generated icons are already in public)

         Create vercel.json at root:
         {
           "buildCommand": "npm run vercel-build",
           "installCommand": "npm install",
           "framework": "nextjs",
           "regions": ["gru1", "iad1", "scl1"],  // Brazil, Virginia, Chile (LATAM)
           "env": {
             "NEXT_PUBLIC_APP_URL": "@app_url"
           },
           "headers": [
             {
               "source": "/sw.js",
               "headers": [
                 { "key": "Cache-Control", "value": "public, max-age=0, must-revalidate" },
                 { "key": "Service-Worker-Allowed", "value": "/" }
               ]
             },
             {
               "source": "/(.*)",
               "headers": [
                 { "key": "X-Content-Type-Options", "value": "nosniff" },
                 { "key": "X-Frame-Options", "value": "DENY" },
                 { "key": "X-XSS-Protection", "value": "1; mode=block" },
                 { "key": "Referrer-Policy", "value": "strict-origin-when-cross-origin" }
               ]
             }
           ]
         }

      B) CI/CD PIPELINE:
         Create .github/workflows/deploy.yml:
         name: Deploy to Vercel
         on: [push to main, pull_request]
         jobs:
           - run: npm install
           - run: npm run lint
           - run: npm run build
           - if: github.ref == 'refs/heads/main':
             run: vercel --prod --token ${{ secrets.VERCEL_TOKEN }}

         Create .github/workflows/ci.yml:
         - Run lint and type check on every PR
         - Block merge if lint fails

      C) ENVIRONMENT VARIABLES DOC:
         Create docs/deployment-checklist.md:
         Step-by-step guide in Spanish:
         1. Create Railway PostgreSQL project
            - Get connection string
            - Run: npx drizzle-kit push
            - Run: npm run db:seed
         2. Create Upstash Redis project
            - Get REST URL and token
         3. Create Replicate account
            - Get API token
         4. Create Stripe account
            - Get secret key, create product ($4.99/mo), get price ID
            - Set up webhook endpoint
         5. Create Mercado Pago account (for CL/AR/MX users)
            - Get access token
         6. Create Vercel project
            - Import from GitHub
            - Add all env vars from .env.example
            - Deploy
         7. Set up custom domain in Vercel dashboard
            - Add DNS records
            - Wait for SSL certificate

      D) DEPLOYMENT TESTING:
         Once Vercel deployment is configured, run a test deployment:
         npm run build && echo "Build successful"

         Check for:
         - No TypeScript errors
         - No ESLint errors
         - Build completes under 5 minutes
         - No missing environment variable errors

      E) POST-DEPLOYMENT VERIFICATION CHECKLIST:
         Create public/deploy-check.html (or docs/post-deploy-checklist.md):
         A checklist the user can follow after deployment:
         □ Homepage loads at <app-url>
         □ /discover shows character grid
         □ /auth/login page renders
         □ /auth/register page renders
         □ PWA manifest accessible at <app-url>/manifest.json
         □ Service worker registered
         □ Sitemap at <app-url>/sitemap.xml
         □ OG image at <app-url>/images/og-default.png

      F) BACKUP & RECOVERY:
         Document in docs/deployment-checklist.md:
         - How to connect to Railway PostgreSQL directly
         - How to restore from seed script
         - How to rollback to previous Vercel deployment

      CONSTRAINTS:
      - All documentation in Spanish
      - Don't commit any actual API keys or secrets
      - Make deployment as simple as possible for the user

      Report: which files created/modified, deployment checklist.
    assigned_to: general
    depends_on: [phase5-gate]
    verified_by: verifier
    verify_prompt: |
      Verify deployment setup:
      1. Confirm vercel.json exists with buildCommand, installCommand, regions, security headers
      2. Confirm .github/workflows/deploy.yml with lint + build + deploy
      3. Confirm .github/workflows/ci.yml with lint + type-check
      4. Confirm docs/deployment-checklist.md with step-by-step setup in Spanish
      5. Confirm docs/post-deploy-checklist.md with verification checklist
      6. Confirm npm run build succeeds (try it)
      7. Confirm no secrets or API keys are committed anywhere
      8. Confirm Vercel regions include LATAM (scl1)
    timeout_ms: 1500000

