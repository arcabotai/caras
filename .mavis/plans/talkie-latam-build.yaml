version: 1
plan:
  name: 'Talkie LATAM — Full Build (16 Tasks, 6 Phases)'
  max_concurrency: 3
  max_consecutive_failures: 2
  max_cycles: 40
  message_to_user: |
    🚀 Launching the full Talkie LATAM build — 16 tasks across 6 phases.

    Phase 1 runs first (DB + Auth + Env config). Each subsequent phase
    unlocks only after the previous one passes verification.

    I'll report back with a CycleReport after each phase completes.
    Hang tight — this is a big one!

tasks:
  # ═══════════════════════════════════════════════════
  # PHASE 1 GATE — must complete before Phase 2 starts
  # ═══════════════════════════════════════════════════
  - id: phase1-gate
    title: 'Phase 1 Gate: Infrastructure Setup Complete'
    prompt: |
      Phase 1 gate task. DO NOT start until p1-db, p1-auth, AND p1-env are ALL marked as complete.
      This task has depends_on: [p1-db, p1-auth, p1-env] for a reason.

      Then verify:
      1. Railway PostgreSQL configured (drizzle.config.ts SSL, scripts/seed.ts, package.json db:seed)
      2. NextAuth JWT flow works (session.user.id populated, bcrypt, Spanish strings)
      3. .env.example has all required vars
      4. .vercelignore exists and ignores .env* and node_modules
      5. scripts/setup-env.sh exists with setup instructions
      6. next.config.ts has image domains for dicebear and googleusercontent
      7. package.json has db:seed and vercel-build scripts

      If any Phase 1 task fails, do NOT pass this gate.
    assigned_to: verifier
    depends_on: [p1-db, p1-auth, p1-env]
    verified_by: verifier
    verify_prompt: |
      Confirm Phase 1 gate signals are all green.
    timeout_ms: 1800000

  # ═══════════════════════════════════════════════════
  # PHASE 1: Setup & Infrastructure (parallel)
  # ═══════════════════════════════════════════════════
  - id: p1-db
    title: 'Database setup + demo seed (Railway PostgreSQL + Drizzle)'
    prompt: |
      You are the Database Agent for Talkie LATAM.

      PROJECT: /Users/felirami/.mavis/agents/general/workspace/talkie-latam/

      CONTEXT:
      - Drizzle ORM schema is already at src/lib/db/schema.ts
      - drizzle.config.ts exists
      - DATABASE_URL will be set by the user in Railway
      - The project uses @neondatabase/serverless and pg for database connections
      - All text must be in Spanish (LATAM neutral)

      YOUR DELIVERABLE — configure Railway PostgreSQL, run migrations, seed demo data:

      1. Read the existing drizzle.config.ts and src/lib/db/schema.ts
      2. Read src/lib/db/index.ts to understand the DB connection setup
      3. Update drizzle.config.ts if needed for Railway PostgreSQL compatibility
      4. Create a Railway-compatible database configuration:
         - If DATABASE_URL is a Neon connection string, ensure SSL is enabled
         - If using pg directly in src/lib/db/index.ts, update it to handle Railway SSL
      5. Run: npx drizzle-kit generate
      6. Run: npx drizzle-kit push (simulate with --dry-run if no real DB yet)
      7. Create a seed script at scripts/seed.ts that inserts 12 demo characters:
         - 3 anime characters (e.g., un estudiante de anime, una娘, un protagonista shonen)
         - 3 game characters (e.g., un aventurero RPG, una guerrera, un villano épico)
         - 3 fiction characters (e.g., un mago sabio, una sirena, un pirata carismático)
         - 3 custom/LATAM characters (e.g., una abuelita querida, un大哥 de barrio, una chamán)
         Each character should have: name, shortDesc (1-2 sentences), fullPrompt (detailed
         character description ~300 words in Spanish), category, tags array, avatarUrl (use
         a placeholder like https://api.dicebear.com/7.x/avataaars/svg?seed=<name>),
         isPublic: true, isPremium: false (except maybe 2 premium exclusives)

         ALSO create 1 demo user: email: demo@talkie.lat, name: "Demo User",
         isPremium: true, with no password hash (OAuth-only demo account)

      8. Add "db:seed" script to package.json
      9. Verify the seed script runs without errors

      CONSTRAINTS:
      - Do NOT modify the existing schema.ts
      - Keep the purple/pink gradient dark theme brand
      - All text in Spanish (LATAM neutral)
      - Database connection must handle Railway's SSL requirements
      - Use uuid v4 for IDs where needed

      Report: which files changed, seed script location, commands to run.
    assigned_to: coder
    depends_on: []
    verified_by: verifier
    verify_prompt: |
      Verify the database setup:
      1. Read drizzle.config.ts and confirm Railway/Neon SSL compatibility
      2. Confirm seed.ts exists at scripts/seed.ts with 12+ characters and 1 demo user
      3. Confirm each seed character has: name, shortDesc, fullPrompt (~300 words), category, tags, avatarUrl, isPublic, isPremium
      4. Confirm package.json has a "db:seed" script
      5. Try running: npx drizzle-kit generate (should produce migration files)
      6. Check for any obvious SQL injection or connection string issues
    timeout_ms: 1800000

  - id: p1-auth
    title: 'NextAuth v5 validation — credentials + Google OAuth end-to-end'
    prompt: |
      You are the Auth Agent for Talkie LATAM.

      PROJECT: /Users/felirami/.mavis/agents/general/workspace/talkie-latam/

      CONTEXT:
      - NextAuth v5 with JWT strategy already configured at src/lib/auth/index.ts
      - DrizzleAdapter connected to PostgreSQL
      - Google OAuth + Credentials providers configured
      - Pages: /auth/login, /auth/register
      - API route: /api/auth/[...nextauth]
      - Schema has users, accounts, sessions tables

      YOUR DELIVERABLE — validate and fix NextAuth flow:

      1. Read src/lib/auth/index.ts carefully
      2. Read src/app/api/auth/[...nextauth]/route.ts
      3. Read src/app/api/auth/register/route.ts
      4. Read src/app/auth/login/page.tsx
      5. Read src/app/auth/register/page.tsx
      6. Read src/types/next-auth.d.ts

      ISSUES TO CHECK AND FIX:
      a) JWT session strategy: ensure token.sub correctly maps to session.user.id
      b) The DrizzleAdapter needs accounts + sessions tables — verify schema matches
      c) Credentials flow: after successful login, session should contain user.id
      d) Google OAuth: verify the callback is configured to link accounts if user exists
      e) Register endpoint: ensure it creates a user AND links to NextAuth sessions
      f) CSRF protection: NextAuth handlers should work without extra config
      g) Error handling: failed auth should redirect to /auth/login with error message
      h) Add a GET handler to /api/auth/[...nextauth] that returns current session (useful for debugging)
      i) Ensure /auth/register properly hashes passwords with bcryptjs before storing
      j) Add proper TypeScript types for the session (session.user.id must be string)

      SESSION DEBUG TOOL:
      Create src/app/api/auth/session/route.ts that returns the current session
      so we can verify auth is working.

      CONSTRAINTS:
      - Do NOT change the auth providers or session strategy (keep JWT)
      - All text in Spanish (error messages, etc.)
      - Keep the existing dark theme styling

      Report: which files changed, what was fixed, and how to test manually.
    assigned_to: coder
    depends_on: []
    verified_by: verifier
    verify_prompt: |
      Verify NextAuth configuration is correct:
      1. Read the updated auth files and confirm JWT session correctly maps user.id
      2. Confirm DrizzleAdapter schema (accounts + sessions) matches NextAuth requirements
      3. Confirm credentials authorize() returns { id, email, name } with id as string
      4. Check /auth/register creates user with bcrypt-hashed password
      5. Confirm /api/auth/session endpoint exists and returns session data
      6. Check that all error messages and UI strings are in Spanish
      7. Verify no security issues (password logged, tokens exposed, etc.)
      8. TypeScript: confirm session.user.id is typed as string
    timeout_ms: 1800000

  - id: p1-env
    title: 'Production .env.example + Vercel deployment config'
    prompt: |
      You are the Environment Agent for Talkie LATAM.

      PROJECT: /Users/felirami/.mavis/agents/general/workspace/talkie-latam/

      CURRENT STATE:
      - .env.example exists with basic vars
      - .env.local exists with placeholder values
      - next.config.ts exists

      YOUR DELIVERABLE — create production-ready environment config:

      1. Read existing .env.example and .env.local
      2. Read next.config.ts

      TASKS:

      A) Expand .env.example with ALL required variables, grouped and commented:
         # Database
         DATABASE_URL=           # Railway PostgreSQL connection string

         # NextAuth
         NEXTAUTH_URL=          # Production URL (e.g. https://talkie-latam.vercel.app)
         NEXTAUTH_SECRET=       # openssl rand -base64 32

         # OAuth
         GOOGLE_CLIENT_ID=
         GOOGLE_CLIENT_SECRET=

         # AI
         OPENROUTER_API_KEY=

         # Image Generation
         REPLICATE_API_TOKEN=   # For FLUX image generation

         # Rate Limiting
         UPSTASH_REDIS_REST_URL=
         UPSTASH_REDIS_REST_TOKEN=

         # Storage
         BLOB_READ_WRITE_TOKEN= # Vercel Blob or Cloudflare R2

         # Payments
         STRIPE_SECRET_KEY=
         STRIPE_WEBHOOK_SECRET=
         STRIPE_PREMIUM_PRICE_ID=
         MERCADOPAGO_ACCESS_TOKEN=
         MERCADOPAGO_WEBHOOK_SECRET=

         # App
         NEXT_PUBLIC_APP_URL=   # https://your-domain.com

      B) Create .env.local.example (copy of .env.example with all values empty)

      C) Create scripts/setup-env.sh that:
         - Prints instructions for each required service
         - Has a section for Railway PostgreSQL setup
         - Has a section for Upstash Redis setup
         - Has a section for Google OAuth setup
         - Has a section for Replicate API setup
         - Has a section for Stripe setup
         - Has a section for Mercado Pago setup
         - Explains how to generate NEXTAUTH_SECRET

      D) Update next.config.ts for Vercel deployment:
         - Add image domains for: api.dicebear.com,lh3.googleusercontent.com
         - Configure headers for PWA
         - Set up output: 'standalone' for Docker-friendly builds (optional)

      E) Create .vercelignore if not exists (should ignore: .env*, node_modules, .next)

      F) Update package.json scripts to include:
         "vercel-build": "npx drizzle-kit push && next build"

      CONSTRAINTS:
      - Do NOT put actual secret values in any file that gets committed
      - All instructions in Spanish
      - Document the difference between client-side (NEXT_PUBLIC_) and server-side vars

      Report: which files created/modified, and the setup checklist.
    assigned_to: general
    depends_on: []
    verified_by: verifier
    verify_prompt: |
      Verify environment configuration:
      1. Confirm .env.example has ALL variables from the spec (DB, NEXTAUTH, OAuth, AI, Replicate, Redis, Blob, Stripe, Mercado Pago, App URL)
      2. Confirm every variable has a comment explaining what it is
      3. Confirm scripts/setup-env.sh exists with sections for each service
      4. Confirm .env.local.example mirrors .env.example (all vars, empty values)
      5. Confirm next.config.ts has image domains for dicebear and googleusercontent
      6. Confirm .vercelignore exists and ignores .env* and node_modules
      7. Confirm package.json has vercel-build script
      8. No actual secrets or tokens hardcoded anywhere
    timeout_ms: 900000

  # ═══════════════════════════════════════════════════
  # PHASE 2 GATE
  # ═══════════════════════════════════════════════════
  - id: phase2-gate
    title: 'Phase 2 Gate: AI Integration Complete'
    prompt: |
      Phase 2 gate task. DO NOT start until p2-chat, p2-character-creator, AND p2-rate-limit are ALL marked as complete.
      This gate has depends_on: [phase1-gate] — wait for p2-chat, p2-character-creator, p2-rate-limit to finish first.

      Then verify:
      1. Chat SSE endpoint has error recovery (fallback message saved on stream failure)
      2. Character creator has FLUX avatar generation + Vercel Blob upload
      3. Rate limiting with Upstash Redis is active (50/day free, unlimited premium)
    assigned_to: verifier
    depends_on: [phase1-gate]
    verified_by: verifier
    verify_prompt: |
      Confirm Phase 2 gate signals are all green.
    timeout_ms: 1800000

  # ═══════════════════════════════════════════════════
  # PHASE 2: AI Integration (parallel)
  # ═══════════════════════════════════════════════════
  - id: p2-chat
    title: 'Chat endpoint stress test + SSE streaming + error recovery'
    prompt: |
      You are the Chat Agent for Talkie LATAM.

      PROJECT: /Users/felirami/.mavis/agents/general/workspace/talkie-latam/

      CONTEXT:
      - Chat API at src/app/api/chat/route.ts — already has SSE streaming
      - Uses OpenRouter for AI (DeepSeek V3 default)
      - SSE with TextEncoder for streaming chunks
      - Message persistence to PostgreSQL
      - Rate limiting already integrated (checkRateLimit from lib/ratelimit)

      YOUR DELIVERABLE — stress test and harden the chat endpoint:

      1. Read src/app/api/chat/route.ts
      2. Read src/lib/ai/openrouter.ts
      3. Read src/lib/ratelimit.ts

      TASKS:

      A) ERROR RECOVERY — The SSE stream has a critical bug:
         If the AI stream starts but then fails mid-way (e.g., network error,
         OpenRouter timeout), the user message is saved but no assistant reply
         is saved. Fix this:
         - On stream error, save an error message to the DB with content:
           "Lo siento, hubo un error técnico. Por favor intenta de nuevo."
         - Return a proper error response, not just controller.error()

      B) SSE RECOVERY:
         - Add retry logic: if stream fails, client should be able to resend
           the same message and get a response (idempotent-friendly)
         - Add a timeout for the AI stream (60 seconds max)
         - Handle OpenRouter rate limit errors (429) gracefully with a
           Spanish error message

      C) MESSAGE PERSISTENCE:
         - Verify both user and assistant messages are saved correctly
         - Check that chatSessions.replyCount increments properly
         - Add error handling around DB writes (don't crash on DB errors)

      D) CHAT HISTORY:
         - The history limit is 20 — consider making this configurable
         - Ensure history is passed correctly to the AI (reverse order, correct format)

      E) CHARACTER-SPECIFIC SYSTEM PROMPT:
         - Read the buildCharacterSystemPrompt function in openrouter.ts
         - Ensure it handles characters with very short or very long fullPrompts
         - Add a max length cap for system prompt (8192 tokens as safety)

      F) Add GET handler to /api/chat that:
         - Returns the chat history for a given sessionId
         - Returns character info (name, avatarUrl)
         - Used for loading chat history on page refresh

      G) Add DELETE handler to /api/chat that:
         - Deletes a chat session and all its messages
         - Requires auth (user can only delete their own sessions)

      H) Add POST /api/chat/feedback endpoint:
         - User can mark a message as helpful/not helpful
         - Store in a new feedback table or characterMemories table

      CONSTRAINTS:
      - All error messages in Spanish (LATAM neutral)
      - Keep the dark theme styling
      - Don't break existing functionality — add, don't replace
      - No changes to the database schema

      Report: which files changed, what was fixed, test plan for SSE.
    assigned_to: coder
    depends_on: [phase1-gate]
    verified_by: verifier
    verify_prompt: |
      Verify chat endpoint improvements:
      1. Read updated chat/route.ts — confirm stream error saves fallback message to DB
      2. Confirm 60-second timeout on AI stream
      3. Confirm OpenRouter 429 errors return Spanish error message
      4. Confirm GET /api/chat returns chat history + character info
      5. Confirm DELETE /api/chat deletes session with auth check
      6. Confirm POST /api/chat/feedback endpoint exists
      7. Confirm system prompt has max length cap (8192 tokens)
      8. Check for any security issues (auth bypass, injection, etc.)
    timeout_ms: 1800000

  - id: p2-character-creator
    title: 'Character creator: Vercel Blob + FLUX image gen + prompt sanitization'
    prompt: |
      You are the Character Creator Agent for Talkie LATAM.

      PROJECT: /Users/felirami/.mavis/agents/general/workspace/talkie-latam/

      CONTEXT:
      - Character creation at src/app/create/page.tsx
      - API route at src/app/api/characters/route.ts
      - Schema: characters table with name, shortDesc, fullPrompt, avatarUrl, category, tags
      - Replicate API for FLUX image generation (REPLICATE_API_TOKEN in env)
      - Vercel Blob for image storage (BLOB_READ_WRITE_TOKEN in env)

      YOUR DELIVERABLE — wire up image upload and AI avatar generation:

      1. Read src/app/create/page.tsx
      2. Read src/app/api/characters/route.ts
      3. Read src/lib/db/schema.ts (characters table)

      TASKS:

      A) PROMPT SANITIZATION (API side):
         - Add input validation in /api/characters/route.ts
         - name: 1-100 chars, trim whitespace
         - shortDesc: 10-300 chars
         - fullPrompt: 100-10000 chars
         - tags: max 10 tags, each 1-50 chars
         - category: must be one of the enum values
         - Block any attempts to inject system prompts or jailbreak instructions
           (check for patterns like "ignore previous instructions", "```system", etc.)
         - Return Spanish error messages for validation failures

      B) AI AVATAR GENERATION:
         Create a new API route: POST /api/characters/generate-avatar
         - Takes a character name and short description
         - Calls Replicate FLUX API to generate an avatar image
         - FLUX model: black-forest-labs/flux-dev or flux-schnell
         - Prompt: use the character name + shortDesc + ", portrait, anime style, colorful, high quality"
         - Upload the generated image to Vercel Blob
         - Return the public URL
         - Handle errors gracefully (if no REPLICATE_API_TOKEN, return a dicebear fallback URL)
         - Set a generation timeout of 90 seconds
         - Cost: estimate ~$0.01-0.05 per generation, document this in UI

      C) VERCEL BLOB INTEGRATION:
         - Install @vercel/blob if not in package.json
         - Create src/lib/blob.ts with upload function
         - Handle the BLOB_READ_WRITE_TOKEN
         - If token not set, fall back to using dicebear avatars

      D) FRONTEND UPDATES (create/page.tsx):
         - Add "Generar imagen con IA" button that calls the avatar API
         - Show loading state during generation (animated spinner, "Generando...")
         - Show the generated image as a preview before submitting
         - Allow user to upload their own image instead (file input)
         - Show character card preview as they fill in the form

      E) CHARACTER CARD PREVIEW:
         - In the create page, show a live preview of how the character will look
           using the CharacterCard component
         - Update preview in real-time as user types name/description

      F) API CHARACTER ENDPOINT UPDATES:
         - GET /api/characters — add pagination (limit, offset)
         - GET /api/characters/[id] — get single character
         - PUT /api/characters/[id] — update character (owner only)
         - DELETE /api/characters/[id] — delete character (owner only)
         - POST /api/characters — create character (authenticated users)

      CONSTRAINTS:
      - All UI text in Spanish (LATAM neutral)
      - Keep the purple/pink gradient dark theme
      - Handle missing API tokens gracefully (fallback modes)
      - No changes to the database schema
      - Image generation must be async-friendly (no blocking on main thread)

      Report: which files changed, how to test avatar generation.
    assigned_to: coder
    depends_on: [phase1-gate]
    verified_by: verifier
    verify_prompt: |
      Verify character creator integration:
      1. Read /api/characters/route.ts — confirm input validation with Spanish errors
      2. Confirm POST /api/characters/generate-avatar exists and calls Replicate FLUX
      3. Confirm Vercel Blob upload is implemented (src/lib/blob.ts)
      4. Confirm create/page.tsx has "Generar imagen con IA" button and preview
      5. Confirm all CRUD endpoints (GET/GET-by-id/PUT/DELETE/POST) on characters
      6. Check for injection vulnerabilities in prompt sanitization
      7. Confirm fallback to dicebear if API tokens are missing
      8. Check image generation timeout (90 seconds)
    timeout_ms: 1800000

  - id: p2-rate-limit
    title: 'Upstash Redis rate limiting + daily counter UI + premium gating'
    prompt: |
      You are the Rate Limit Agent for Talkie LATAM.

      PROJECT: /Users/felirami/.mavis/agents/general/workspace/talkie-latam/

      CONTEXT:
      - src/lib/ratelimit.ts already has checkRateLimit and getMessageLimit
      - Upstash Redis (@upstash/redis, @upstash/ratelimit) already in package.json
      - Chat endpoint already calls checkRateLimit
      - User model has isPremium and messageCount fields

      YOUR DELIVERABLE — implement complete rate limiting system:

      1. Read src/lib/ratelimit.ts
      2. Read src/app/api/chat/route.ts

      TASKS:

      A) RATE LIMIT CONFIGURATION:
         Update ratelimit.ts:
         - Free tier: 50 messages per day (not per hour — per rolling 24h window)
         - Premium tier: unlimited messages (return success immediately)
         - Implement using Upstash Ratelimit with a sliding window
         - Use user ID as the identifier

      B) DAILY MESSAGE COUNTER UI:
         - Create a new component: src/components/message-counter.tsx
         - Shows: "Mensajes hoy: X/50" with a progress bar
         - Colors: green (0-30), yellow (31-40), red (41-50)
         - On hover, show "Premium: mensajes ilimitados" if premium
         - Position: bottom of chat interface (above the input)
         - Include a "Obtener Premium" button when limit is near (>=40 messages)
         - Animated counter that increments as messages are sent

      C) RATE LIMIT ERROR HANDLING:
         - When rate limited, show a beautiful Spanish error toast
         - Include a countdown: "Podrás chatear de nuevo en X horas"
         - Add a "Obtener Premium" CTA in the error message

      D) PREMIUM DETECTION IN CHAT:
         - In the chat endpoint, if user.isPremium, skip rate limit check entirely
         - Add X-RateLimit-Remaining and X-RateLimit-Premium headers to response
         - Frontend reads these headers to update the counter UI

      E) CHARACTER PREMIUM GATING:
         - Characters have isPremium field in schema
         - In GET /api/characters, mark premium characters with a 🔒 badge
         - In chat endpoint, check if character.isPremium before allowing chat
         - Non-premium users trying to chat with premium characters should get:
           "Este personaje es exclusivo para usuarios Premium. ¡Actualiza para chatear con él!"

      F) RATE LIMIT API ENDPOINT:
         - GET /api/ratelimit/status — returns:
           { used: number, limit: number, remaining: number, isPremium: boolean, resetsAt: Date }

      G) SLIDING WINDOW IMPLEMENTATION:
         - Use @upstash/ratelimit with { interval: "1 d", prefix: "talkie-chat" }
         - Implement proper retry-after headers
         - Handle Redis connection failures gracefully (allow the request through, log error)

      CONSTRAINTS:
      - All text in Spanish (LATAM neutral)
      - Keep purple/pink gradient dark theme
      - No changes to database schema
      - Rate limit must survive Redis restarts (using persistent storage)
      - Free tier MUST be enforced (no way to bypass)

      Report: which files changed, rate limit configuration.
    assigned_to: coder
    depends_on: [phase1-gate]
    verified_by: verifier
    verify_prompt: |
      Verify rate limiting implementation:
      1. Read updated ratelimit.ts — confirm sliding window, 50/day for free, unlimited for premium
      2. Confirm message-counter.tsx component exists with progress bar and colors
      3. Confirm premium users bypass rate limit check
      4. Confirm GET /api/ratelimit/status returns correct structure
      5. Confirm premium character gating in chat endpoint
      6. Confirm Redis failure fallback (allow request through)
      7. Check all UI text is in Spanish
      8. Verify the counter UI component is properly styled (dark theme)
    timeout_ms: 1500000

  # ═══════════════════════════════════════════════════
  # PHASE 3 GATE
  # ═══════════════════════════════════════════════════
  - id: phase3-gate
    title: 'Phase 3 Gate: Frontend Polish Complete'
    prompt: |
      Phase 3 gate task. Only mark done after verifying:
      (1) All pages mobile-responsive with skeleton loaders, (2) PWA icons + SW works offline,
      (3) SEO meta tags + sitemap + structured data implemented.
    assigned_to: verifier
    depends_on: [phase2-gate]
    verified_by: verifier
    verify_prompt: |
      Confirm Phase 3 gate signals are all green.
    timeout_ms: 60000

  # ═══════════════════════════════════════════════════
  # PHASE 3: Frontend Polish (parallel)
  # ═══════════════════════════════════════════════════
  - id: p3-ui
    title: 'Mobile responsiveness audit + skeleton loaders + animations polish'
    prompt: |
      You are the UI Agent for Talkie LATAM.

      PROJECT: /Users/felirami/.mavis/agents/general/workspace/talkie-latam/

      CONTEXT:
      - Next.js 14 App Router
      - Tailwind CSS v4 + Shadcn/ui components
      - Dark purple/pink gradient theme throughout
      - Existing pages: / (landing), /discover, /chat/[id], /create, /auth/login, /auth/register
      - Shadcn/ui components in src/components/ui/

      YOUR DELIVERABLE — audit and polish all pages for mobile-first:

      1. Read src/app/page.tsx (landing)
      2. Read src/app/discover/page.tsx
      3. Read src/app/chat/[id]/page.tsx
      4. Read src/app/create/page.tsx
      5. Read src/app/globals.css

      TASKS:

      A) MOBILE AUDIT — Test each page at mobile viewport:
         - Landing: nav hamburger menu, stacked sections, readable text
         - Discover: grid → 1 column on mobile, 2 on tablet, 3-4 on desktop
         - Chat: input at bottom, message bubbles full width, keyboard-friendly
         - Create: form fields stacked, avatar upload thumb works on touch

         Fix any overflow-x, text-too-small, or unclickable button issues.

      B) SKELETON LOADERS:
         - Create src/components/skeleton-loader.tsx with a reusable skeleton component
         - Add loading skeletons to:
           * /discover: skeleton cards while loading characters
           * /chat/[id]: skeleton messages while loading chat history
           * /create: skeleton form while loading (if async data needed)
         - Use the dark theme colors (not white) for skeletons
           Colors: bg-purple-900/20 for skeleton bg, animate-pulse

      C) ANIMATIONS & TRANSITIONS:
         - Add page transitions: fade-in on route change (use Framer Motion or CSS)
         - Add hover effects on character cards (scale up, glow effect)
         - Add typing indicator animation in chat (3 dots bouncing)
         - Add success/error toast animations (slide in from top)
